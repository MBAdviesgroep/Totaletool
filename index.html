<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESG Dossier Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: Inter; background:#f5f7fa; }
.card { background:white; padding:24px; border-radius:12px; margin:20px; }
.select-card { padding:20px; border:1px solid #ddd; border-radius:10px; cursor:pointer; margin:10px; }
.select-card:hover { border-color:#0f1f3d; }
.error { color:red; }
</style>
</head>
<body>

<div class="card">
<h2>Selecteer type aanvrager</h2>
<div onclick="selectType('particulier')" class="select-card">Particulier</div>
<div onclick="selectType('ondernemer')" class="select-card">Ondernemer / zakelijk</div>
<div onclick="selectType('vve')" class="select-card">VvE</div>

<p id="error"></p>
<button onclick="generate()">Genereer rapport</button>
</div>

<div id="output"></div>

<script src="logic.js"></script>
<script src="render.js"></script>

<script>
let selectedApplicantType = null;

function selectType(type){
  selectedApplicantType = type;
}

function generate(){
  if(!selectedApplicantType){
    document.getElementById('error').innerText = "Selecteer eerst een type.";
    return;
  }

  const raw = {
    applicantType: selectedApplicantType,
    address: "Demo object",
    totalInvestment: 24000,
    annualSavings: 1500,
    currentEnergyCosts: 2500,
    co2ReductionTotal: 2.2,
    co2ReductionPercent: 56,
    labelCurrent: 'E',
    labelTarget: 'A'
  };

  const data = normalizeData(raw);
  renderReport(data);
}
</script>

</body>
</html>
